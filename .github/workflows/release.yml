name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write     # to create releases
  packages: write     # to push to ghcr
  id-token: write     # cosign keyless

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
      - name: Trivy scan (HIGH+CRITICAL fail)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image
        run: cosign sign --yes ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}

  build-pkgs:
    runs-on: ubuntu-latest
    container: rockylinux:9
    steps:
      - name: Install builders
        run: |
          dnf install -y --setopt=install_weak_deps=False \
              python3.12 python3.12-devel python3.12-pip \
              ruby ruby-devel rpm-build dpkg gcc make tar git ca-certificates curl
          gem install --no-document fpm
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Build RPM + DEB
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make pkg
      - name: Generate CycloneDX SBOM
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run cyclonedx-py requirements --of json --output dist/sbom.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            dist/pkg/*.rpm
            dist/pkg/*.deb
            dist/sbom.json

  publish-release:
    needs: [build-image, build-pkgs]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/pkg/*.rpm
            dist/pkg/*.deb
            dist/sbom.json
