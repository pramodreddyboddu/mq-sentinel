apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: mq-sentinel
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mq-sentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mq-sentinel
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: mq-sentinel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: "{{ $v }}"
            {{- end }}
            {{- if .Values.oidc.issuer }}
            - name: MQS_AUTH_OIDC_ISSUER
              value: "{{ .Values.oidc.issuer }}"
            {{- end }}
            {{- if .Values.oidc.audience }}
            - name: MQS_AUTH_OIDC_AUDIENCE
              value: "{{ .Values.oidc.audience }}"
            {{- end }}
            {{- if .Values.oidc.jwksUrl }}
            - name: MQS_AUTH_OIDC_JWKS_URL
              value: "{{ .Values.oidc.jwksUrl }}"
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: audit
              mountPath: /var/audit
            - name: secrets
              mountPath: /var/secrets
              readOnly: true
      volumes:
        - name: audit
          emptyDir: {}
        - name: secrets
          secret:
            secretName: {{ .Release.Name }}-mq-credentials
            defaultMode: 0400
