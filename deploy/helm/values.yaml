image:
  repository: ghcr.io/pramodreddyboddu/mq-sentinel
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 2

env:
  MQS_SERVER_ENVIRONMENT: prod
  MQS_SERVER_TRANSPORT: http
  MQS_SERVER_HTTP_PORT: "8080"
  MQS_AUDIT_LOG_PATH: /var/audit/audit.jsonl
  MQS_SECURITY_RATE_LIMIT_PER_MINUTE: "60"

oidc:
  issuer: ""
  audience: ""
  jwksUrl: ""

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

networkPolicy:
  enabled: true
  allowedEgressCIDRs: []  # populate with QM subnets only

service:
  type: ClusterIP
  port: 8080

podDisruptionBudget:
  minAvailable: 1
